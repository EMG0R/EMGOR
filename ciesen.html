<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'Courier New', Courier, monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            position: fixed;
            top: 0; left: 0;
        }

        .home-button {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            left: max(16px, env(safe-area-inset-left));
            z-index: 100;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .home-button:hover { color: rgba(255,255,255,0.95); }

        #status {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
            transition: opacity 0.8s;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #status.hidden { opacity: 0; pointer-events: none; }
        #status.error { color: rgba(239,80,60,0.8); background: rgba(0,0,0,0.92); font-size: 0.65rem; }

        #chuck-output {
            position: fixed;
            bottom: max(8px, env(safe-area-inset-bottom));
            left: max(8px, env(safe-area-inset-left));
            z-index: 100;
            font-size: 0.58rem;
            color: rgba(255,255,255,0.18);
            max-width: 50vw;
            max-height: 18vh;
            overflow-y: auto;
            pointer-events: none;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #tap-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.85);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #tap-overlay.show { display: flex; }
        #tap-overlay .tap-ring {
            width: 100px; height: 100px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: tapPulse 2s ease-in-out infinite;
        }
        #tap-overlay .tap-icon {
            font-size: 1.6rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }
        #tap-overlay .tap-label {
            margin-top: 18px;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
        @keyframes tapPulse {
            0%, 100% { transform: scale(1); border-color: rgba(255,255,255,0.15); }
            50% { transform: scale(1.08); border-color: rgba(255,255,255,0.3); }
        }
    </style>
    <title>CIESEN</title>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <a href="index.html" class="home-button">&#8962;</a>
    <div id="status">Loading CIESEN</div>
    <div id="tap-overlay">
        <div class="tap-ring">
            <span class="tap-icon">&#9654;</span>
        </div>
        <div class="tap-label">tap to start audio</div>
    </div>
    <div id="chuck-output"></div>

    <script type="module">
        const statusEl  = document.getElementById('status');
        const outputEl  = document.getElementById('chuck-output');
        const tapOverlay = document.getElementById('tap-overlay');

        // cycling dots
        let dotCount = 0;
        const dotInterval = setInterval(() => {
            dotCount = (dotCount + 1) % 4;
            if (!statusEl.classList.contains('error') && !statusEl.classList.contains('hidden')) {
                statusEl.textContent = 'Loading CIESEN' + '.'.repeat(dotCount);
            }
        }, 400);

        function log(msg) {
            outputEl.textContent += msg + '\n';
            const lines = outputEl.textContent.split('\n');
            if (lines.length > 40) outputEl.textContent = lines.slice(-40).join('\n');
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        function fail(msg) {
            clearInterval(dotInterval);
            statusEl.className = 'error';
            statusEl.textContent = msg;
        }

        function withTimeout(promise, ms, msg) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error(msg)), ms))
            ]);
        }

        // ── iOS Safari audio unlock ──────────────────────────────────
        // iOS 17+ requires touchend (NOT touchstart) to unlock audio.
        // Must play a silent buffer AND call resume() together (Howler/Tone pattern).
        // Safari has a non-standard "interrupted" state we must handle.

        const _capturedContexts = [];
        let _audioUnlocked = false;
        const _OrigAC = window.AudioContext || window.webkitAudioContext;

        // Monkey-patch AudioContext constructor to capture contexts created in WASM
        if (_OrigAC) {
            function PatchedAC() {
                const ctx = new _OrigAC();
                _capturedContexts.push(ctx);
                console.log('[CIESEN] captured AudioContext, state:', ctx.state);
                return ctx;
            }
            PatchedAC.prototype = _OrigAC.prototype;
            if (window.AudioContext) window.AudioContext = PatchedAC;
            if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
        }

        // The real unlock: silent buffer + resume (Howler.js / Tone.js proven pattern)
        function unlockAudioContext(ctx) {
            if (!ctx || ctx.state === 'running') return Promise.resolve();
            return new Promise(resolve => {
                // Play a silent buffer — this is what actually unlocks on iOS
                const buffer = ctx.createBuffer(1, 1, ctx.sampleRate || 22050);
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.connect(ctx.destination);
                source.start(0);
                source.onended = () => {
                    source.disconnect();
                };
                // Also call resume — handles both suspended AND Safari's "interrupted" state
                ctx.resume().then(() => {
                    log('ctx unlocked: ' + ctx.state);
                    resolve();
                }).catch(() => resolve());
            });
        }

        function unlockAll() {
            const promises = _capturedContexts.map(ctx => unlockAudioContext(ctx));
            Promise.all(promises).then(() => {
                const allRunning = _capturedContexts.every(c => c.state === 'running');
                if (allRunning && _capturedContexts.length > 0) {
                    _audioUnlocked = true;
                    tapOverlay.classList.remove('show');
                    log('all audio unlocked');
                    // Clean up gesture listeners once unlocked
                    _unlockEvents.forEach(ev =>
                        document.removeEventListener(ev, _onGesture, true)
                    );
                }
            });
        }

        function _onGesture() { unlockAll(); }

        // iOS 17+: touchend is the reliable unlock event, NOT touchstart.
        // touchstart can actually interfere. Use touchend + click + keydown.
        const _unlockEvents = ['touchend', 'click', 'keydown'];
        _unlockEvents.forEach(ev =>
            document.addEventListener(ev, _onGesture, { capture: true })
        );

        // Handle Safari's "interrupted" state — happens on tab switch / screen lock.
        // Re-resume when page becomes visible again.
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                _capturedContexts.forEach(ctx => {
                    if (ctx.state !== 'running') {
                        ctx.resume().then(() => log('resumed after visibility change'));
                    }
                });
            }
        });

        if (location.protocol === 'file:') {
            fail('requires HTTP server\n\nnpx serve .\nthen open http://localhost:PORT/ciesen.html');
        } else {
            (async () => {
                try {
                    const { default: ChuGL } = await withTimeout(
                        import('https://cdn.jsdelivr.net/npm/webchugl/+esm'),
                        15000,
                        'CDN import timed out — check network connection'
                    );

                    const ck = await withTimeout(
                        ChuGL.init({
                            canvas: document.getElementById('canvas'),
                            onError: (msg) => {
                                console.error('[WebChuGL]', msg);
                                log('[error] ' + msg);
                            }
                        }),
                        30000,
                        'WebChuGL init timed out.\n\nThis usually means WebGPU is not available.\n\niOS: Settings > Safari > Feature Flags > WebGPU\nAndroid: use Chrome 113+\nDesktop: Chrome/Edge 113+'
                    );

                    ck.chuckPrint = (msg) => {
                        console.log('[ChucK]', msg);
                        log(msg);
                    };

                    const result = await withTimeout(
                        ck.runFile('./_CIESEN.ck?v=' + Date.now()),
                        20000,
                        'Loading _CIESEN.ck timed out'
                    );

                    if (result && (result.error || result.shredId === 0)) {
                        let err = result.error || 'unknown error';
                        try { err = err || await ck.getLastError(); } catch(e) {}
                        fail('compile error:\n\n' + err);
                        return;
                    }

                    clearInterval(dotInterval);
                    statusEl.classList.add('hidden');

                    // Get the actual AudioContext from WebChucK.
                    // ck.audioContext (getter) or ck.context (inherited AudioWorkletNode)
                    const ckCtx = ck.audioContext || ck.context;
                    log('captured ' + _capturedContexts.length + ' ctx(s)');
                    if (ckCtx) {
                        log('ck audio: ' + ckCtx.state);
                        if (!_capturedContexts.includes(ckCtx)) {
                            _capturedContexts.push(ckCtx);
                        }
                        // Watch for Safari "interrupted" → auto-resume
                        ckCtx.onstatechange = () => {
                            log('ctx state: ' + ckCtx.state);
                            if (ckCtx.state === 'interrupted') {
                                ckCtx.resume().then(() => log('resumed from interrupted'));
                            }
                        };
                    }

                    // Try immediate unlock (works on desktop, may work if user already tapped)
                    unlockAll();

                    // If still suspended, show the tap overlay
                    setTimeout(() => {
                        const needsUnlock = _capturedContexts.some(c => c.state !== 'running');
                        if (needsUnlock) {
                            tapOverlay.classList.add('show');
                            log('tap overlay shown — waiting for gesture');
                        }
                    }, 300);

                    // Tap overlay handler — dedicated unlock on direct tap
                    tapOverlay.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        unlockAll();
                    });
                    tapOverlay.addEventListener('click', () => {
                        unlockAll();
                    });

                    // Prevent iOS rubber-banding on canvas
                    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

                } catch (err) {
                    console.error('[CIESEN]', err);
                    let detail = err.message || String(err);
                    if (detail.includes('GPU') || detail.includes('gpu') || detail.includes('adapter')) {
                        detail += '\n\niOS: Settings > Safari > Feature Flags > WebGPU';
                    }
                    fail(detail);
                }
            })();
        }
    </script>
</body>
</html>
