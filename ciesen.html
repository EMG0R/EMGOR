<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { width: 100%; height: 100%; display: block; outline: none; }

        .home-button {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.2s;
        }
        .home-button:hover { color: rgba(255,255,255,0.95); }

        #status {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
            transition: opacity 0.8s;
        }
        #status.hidden { opacity: 0; pointer-events: none; }
        #status.error { color: rgba(239,80,60,0.8); background: rgba(0,0,0,0.92); }

        #chuck-output {
            position: fixed;
            bottom: 8px;
            left: 8px;
            z-index: 100;
            font-size: 0.58rem;
            color: rgba(255,255,255,0.18);
            max-width: 50vw;
            max-height: 18vh;
            overflow-y: auto;
            pointer-events: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
    <title>CIESEN</title>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <a href="index.html" class="home-button">&#8962;</a>
    <div id="status">Loading CIESEN</div>
    <div id="chuck-output"></div>

    <script type="module">
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('chuck-output');

        // cycling dots animation
        let dotCount = 0;
        const dotInterval = setInterval(() => {
            dotCount = (dotCount + 1) % 4;
            if (!statusEl.classList.contains('error') && !statusEl.classList.contains('hidden')) {
                statusEl.textContent = 'Loading CIESEN' + '.'.repeat(dotCount);
            }
        }, 400);

        function log(msg) {
            outputEl.textContent += msg + '\n';
            const lines = outputEl.textContent.split('\n');
            if (lines.length > 40) outputEl.textContent = lines.slice(-40).join('\n');
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        // preflight
        if (location.protocol === 'file:') {
            statusEl.className = 'error';
            statusEl.textContent = 'requires HTTP server\n\nnpx serve .\nthen open http://localhost:PORT/ciesen.html';
        } else if (!navigator.gpu) {
            statusEl.className = 'error';
            statusEl.textContent = 'WebGPU not available\nUse Chrome 113+ or Edge 113+';
        } else {
            // auto-init — same pattern as official WebChuGL examples
            (async () => {
                try {
                    const { default: ChuGL } = await import(
                        'https://cdn.jsdelivr.net/npm/webchugl/+esm'
                    );

                    const ck = await ChuGL.init({
                        canvas: document.getElementById('canvas'),
                        onError: (msg) => {
                            console.error('[WebChuGL]', msg);
                            log('[error] ' + msg);
                        }
                    });

                    ck.chuckPrint = (msg) => {
                        console.log('[ChucK]', msg);
                        log(msg);
                    };

                    const result = await ck.runFile('./_CIESEN.ck?v=' + Date.now());

                    if (result && (result.error || result.shredId === 0)) {
                        let err = result.error || 'unknown error';
                        try { err = err || await ck.getLastError(); } catch(e) {}
                        console.error('[ChucK]', err);
                        statusEl.className = 'error';
                        statusEl.textContent = 'compile error:\n\n' + err;
                        return;
                    }

                    clearInterval(dotInterval);
                    statusEl.classList.add('hidden');
                } catch (err) {
                    console.error('[CIESEN]', err);
                    let detail = err.message || String(err);
                    if (detail.includes('Failed to fetch') || detail.includes('NetworkError')) {
                        detail += '\n\n• serve via HTTP (npx serve .)\n• check network/firewall';
                    }
                    statusEl.className = 'error';
                    statusEl.textContent = detail;
                }
            })();
        }
    </script>
</body>
</html>
