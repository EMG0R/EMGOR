<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'Courier New', Courier, monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            position: fixed;
            top: 0; left: 0;
        }

        .home-button {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            left: max(16px, env(safe-area-inset-left));
            z-index: 100;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .home-button:hover { color: rgba(255,255,255,0.95); }

        #status {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
            transition: opacity 0.8s;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #status.hidden { opacity: 0; pointer-events: none; }
        #status.error { color: rgba(239,80,60,0.8); background: rgba(0,0,0,0.92); font-size: 0.65rem; }

        #chuck-output {
            position: fixed;
            bottom: max(8px, env(safe-area-inset-bottom));
            left: max(8px, env(safe-area-inset-left));
            z-index: 100;
            font-size: 0.58rem;
            color: rgba(255,255,255,0.18);
            max-width: 50vw;
            max-height: 18vh;
            overflow-y: auto;
            pointer-events: none;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #tap-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.85);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #tap-overlay.show { display: flex; }
        #tap-overlay .tap-ring {
            width: 100px; height: 100px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: tapPulse 2s ease-in-out infinite;
        }
        #tap-overlay .tap-icon {
            font-size: 1.6rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }
        #tap-overlay .tap-label {
            margin-top: 18px;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
        @keyframes tapPulse {
            0%, 100% { transform: scale(1); border-color: rgba(255,255,255,0.15); }
            50% { transform: scale(1.08); border-color: rgba(255,255,255,0.3); }
        }
    </style>
    <title>CIESEN</title>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <a href="index.html" class="home-button">&#8962;</a>
    <div id="status">Loading CIESEN</div>
    <div id="tap-overlay">
        <div class="tap-ring">
            <span class="tap-icon">&#9654;</span>
        </div>
        <div class="tap-label">tap to start</div>
    </div>
    <div id="chuck-output"></div>

    <script type="module">
        const statusEl   = document.getElementById('status');
        const outputEl   = document.getElementById('chuck-output');
        const tapOverlay = document.getElementById('tap-overlay');

        let dotCount = 0;
        const dotInterval = setInterval(() => {
            dotCount = (dotCount + 1) % 4;
            if (!statusEl.classList.contains('error') && !statusEl.classList.contains('hidden')) {
                statusEl.textContent = 'Loading CIESEN' + '.'.repeat(dotCount);
            }
        }, 400);

        function log(msg) {
            outputEl.textContent += msg + '\n';
            const lines = outputEl.textContent.split('\n');
            if (lines.length > 40) outputEl.textContent = lines.slice(-40).join('\n');
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        function fail(msg) {
            clearInterval(dotInterval);
            statusEl.className = 'error';
            statusEl.textContent = msg;
        }

        function withTimeout(promise, ms, msg) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error(msg)), ms))
            ]);
        }

        // ── iOS Safari audio fix ──────────────────────────────────────
        //
        // WHY previous attempts failed:
        // WebChuGL's handleInitAudio() creates AudioContext INSIDE WASM
        // execution (when ChucK uses dac). On iOS, this context starts
        // suspended. Then audioWorklet.addModule() + AudioWorkletNode
        // creation happen on a SUSPENDED context. Even though we later
        // resume() it, the AudioWorkletNode's process() callback may
        // never fire on iOS Safari — a known Safari AudioWorklet bug
        // where nodes created on suspended contexts don't activate.
        //
        // THE FIX:
        // Pre-create an AudioContext IN the user's tap gesture (so iOS
        // honors resume()). Then monkey-patch returns this ALREADY-RUNNING
        // context when WebChuGL tries to create one. This guarantees
        // addModule() and AudioWorkletNode happen on a running context.
        //
        // Flow: import → ChuGL.init (no audio yet) → show tap →
        //       user taps → pre-create+resume ctx → runFile →
        //       handleInitAudio gets our running ctx → audio works

        const _OrigAC = window.AudioContext || window.webkitAudioContext;
        let _preCtx = null; // pre-created AudioContext from user gesture

        // Monkey-patch: return pre-created running context if available,
        // otherwise create new one with forwarded args
        if (_OrigAC) {
            const Patched = function(...args) {
                if (_preCtx) {
                    const ctx = _preCtx;
                    _preCtx = null;
                    console.log('[CIESEN] gave pre-created ctx:', ctx.state, 'sr:', ctx.sampleRate);
                    return ctx;
                }
                const ctx = new _OrigAC(...args);
                console.log('[CIESEN] new ctx:', ctx.state, 'sr:', ctx.sampleRate);
                return ctx;
            };
            Patched.prototype = _OrigAC.prototype;
            if (window.AudioContext) window.AudioContext = Patched;
            if (window.webkitAudioContext) window.webkitAudioContext = Patched;
        }

        // Safari tab-switch / screen-lock recovery
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState !== 'visible') return;
            // Try to resume any context that got interrupted
            const ctx = _preCtx || (window._ckInstance && window._ckInstance.audioContext);
            if (ctx && ctx.state !== 'running') {
                ctx.resume().then(() => log('visibility resumed'));
            }
        });

        if (location.protocol === 'file:') {
            fail('requires HTTP server\n\nnpx serve .\nthen open http://localhost:PORT/ciesen.html');
        } else {
            (async () => {
                try {
                    // Phase 1: Import WebChuGL + init (WebGPU/WASM, no audio yet)
                    const { default: ChuGL } = await withTimeout(
                        import('https://cdn.jsdelivr.net/npm/webchugl/+esm'),
                        15000,
                        'CDN import timed out — check network connection'
                    );

                    const ck = await withTimeout(
                        ChuGL.init({
                            canvas: document.getElementById('canvas'),
                            onError: (msg) => {
                                console.error('[WebChuGL]', msg);
                                log('[error] ' + msg);
                            }
                        }),
                        30000,
                        'WebChuGL init timed out.\n\nThis usually means WebGPU is not available.\n\niOS: Settings > Safari > Feature Flags > WebGPU\nAndroid: use Chrome 113+\nDesktop: Chrome/Edge 113+'
                    );

                    window._ckInstance = ck;

                    ck.chuckPrint = (msg) => {
                        console.log('[ChucK]', msg);
                        log(msg);
                    };

                    // Phase 2: Wait for user gesture (tap/click)
                    // This is REQUIRED before runFile — we need to pre-create
                    // a running AudioContext so WebChuGL's handleInitAudio
                    // gets a running context (not suspended).
                    clearInterval(dotInterval);
                    statusEl.classList.add('hidden');
                    tapOverlay.classList.add('show');

                    await new Promise(resolve => {
                        function onGesture() {
                            // Pre-create AudioContext IN the gesture call stack.
                            // iOS Safari ONLY honors resume() during user gesture.
                            if (!_preCtx) {
                                _preCtx = new _OrigAC({ latencyHint: 'interactive' });
                                _preCtx.resume();
                                log('pre-ctx: ' + _preCtx.state + ' sr:' + _preCtx.sampleRate);
                            }
                            tapOverlay.classList.remove('show');
                            // Clean up all gesture listeners
                            ['touchend', 'click', 'keydown'].forEach(ev => {
                                tapOverlay.removeEventListener(ev, onGesture);
                                document.removeEventListener(ev, onGesture, true);
                            });
                            resolve();
                        }
                        // touchend — NOT touchstart (miniaudio#759, iOS 17+)
                        tapOverlay.addEventListener('touchend', onGesture);
                        tapOverlay.addEventListener('click', onGesture);
                        document.addEventListener('keydown', onGesture, { capture: true });
                    });

                    // Phase 3: Run ChucK file — audio init happens here.
                    // handleInitAudio calls new AudioContext() → monkey-patch
                    // returns our pre-created RUNNING context → addModule()
                    // and AudioWorkletNode happen on a running context → audio works.
                    log('starting ChucK...');
                    const result = await withTimeout(
                        ck.runFile('./_CIESEN.ck?v=' + Date.now()),
                        20000,
                        'Loading _CIESEN.ck timed out'
                    );

                    if (result && (result.error || result.shredId === 0)) {
                        let err = result.error || 'unknown error';
                        try { err = err || await ck.getLastError(); } catch(e) {}
                        fail('compile error:\n\n' + err);
                        return;
                    }

                    // Log audio pipeline state
                    const ckCtx  = ck.audioContext;
                    const ckNode = ck.audioNode;
                    log('ctx: ' + (ckCtx ? ckCtx.state + ' sr:' + ckCtx.sampleRate : 'null'));
                    log('node: ' + (ckNode ? 'connected' : 'NULL'));

                    // Handle Safari interrupted state
                    if (ckCtx) {
                        ckCtx.onstatechange = () => {
                            log('state: ' + ckCtx.state);
                            if (ckCtx.state === 'interrupted' || ckCtx.state === 'suspended') {
                                ckCtx.resume();
                            }
                        };
                    }

                    // Prevent iOS rubber-banding
                    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

                } catch (err) {
                    console.error('[CIESEN]', err);
                    let detail = err.message || String(err);
                    if (detail.includes('GPU') || detail.includes('gpu') || detail.includes('adapter')) {
                        detail += '\n\niOS: Settings > Safari > Feature Flags > WebGPU';
                    }
                    fail(detail);
                }
            })();
        }
    </script>
</body>
</html>
