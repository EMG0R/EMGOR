<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'Courier New', Courier, monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            position: fixed;
            top: 0; left: 0;
        }

        .home-button {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            left: max(16px, env(safe-area-inset-left));
            z-index: 100;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .home-button:hover { color: rgba(255,255,255,0.95); }

        #status {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
            transition: opacity 0.8s;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #status.hidden { opacity: 0; pointer-events: none; }
        #status.error { color: rgba(239,80,60,0.8); background: rgba(0,0,0,0.92); font-size: 0.65rem; }

        #chuck-output {
            position: fixed;
            bottom: max(8px, env(safe-area-inset-bottom));
            left: max(8px, env(safe-area-inset-left));
            z-index: 100;
            font-size: 0.58rem;
            color: rgba(255,255,255,0.18);
            max-width: 50vw;
            max-height: 18vh;
            overflow-y: auto;
            pointer-events: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
    <title>CIESEN</title>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <a href="index.html" class="home-button">&#8962;</a>
    <div id="status">Loading CIESEN</div>
    <div id="chuck-output"></div>

    <script type="module">
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('chuck-output');

        // cycling dots
        let dotCount = 0;
        const dotInterval = setInterval(() => {
            dotCount = (dotCount + 1) % 4;
            if (!statusEl.classList.contains('error') && !statusEl.classList.contains('hidden')) {
                statusEl.textContent = 'Loading CIESEN' + '.'.repeat(dotCount);
            }
        }, 400);

        function log(msg) {
            outputEl.textContent += msg + '\n';
            const lines = outputEl.textContent.split('\n');
            if (lines.length > 40) outputEl.textContent = lines.slice(-40).join('\n');
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        function fail(msg) {
            clearInterval(dotInterval);
            statusEl.className = 'error';
            statusEl.textContent = msg;
        }

        // promise with timeout
        function withTimeout(promise, ms, msg) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error(msg)), ms))
            ]);
        }

        // iOS audio unlock: intercept AudioContext constructor BEFORE ChuGL loads.
        // WebChuGL creates its AudioContext internally (in WASM/closure) where we
        // can't reach it via property names. By monkey-patching the constructor,
        // we capture every AudioContext created on this page so we can resume them
        // on user gesture.
        const _capturedContexts = [];
        const _OrigAC = window.AudioContext || window.webkitAudioContext;
        if (_OrigAC) {
            function PatchedAC() {
                const ctx = new _OrigAC();
                _capturedContexts.push(ctx);
                console.log('[CIESEN] captured AudioContext', ctx.state);
                return ctx;
            }
            PatchedAC.prototype = _OrigAC.prototype;
            if (window.AudioContext) window.AudioContext = PatchedAC;
            if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
        }

        function resumeAllAudio() {
            for (const ctx of _capturedContexts) {
                if (ctx.state === 'suspended') {
                    ctx.resume().then(() => log('audio context resumed'));
                }
            }
        }

        // Register EARLY — captures taps during the loading screen
        ['touchstart', 'touchend', 'click', 'keydown'].forEach(ev =>
            document.addEventListener(ev, resumeAllAudio, { capture: true })
        );

        if (location.protocol === 'file:') {
            fail('requires HTTP server\n\nnpx serve .\nthen open http://localhost:PORT/ciesen.html');
        } else {
            (async () => {
                try {
                    // import with 15s timeout
                    const { default: ChuGL } = await withTimeout(
                        import('https://cdn.jsdelivr.net/npm/webchugl/+esm'),
                        15000,
                        'CDN import timed out — check network connection'
                    );

                    // init with 30s timeout — catches iOS service worker hang
                    const ck = await withTimeout(
                        ChuGL.init({
                            canvas: document.getElementById('canvas'),
                            onError: (msg) => {
                                console.error('[WebChuGL]', msg);
                                log('[error] ' + msg);
                            }
                        }),
                        30000,
                        'WebChuGL init timed out.\n\nThis usually means WebGPU is not available.\n\niOS: Settings > Safari > Feature Flags > WebGPU\nAndroid: use Chrome 113+\nDesktop: Chrome/Edge 113+'
                    );

                    ck.chuckPrint = (msg) => {
                        console.log('[ChucK]', msg);
                        log(msg);
                    };

                    const result = await withTimeout(
                        ck.runFile('./_CIESEN.ck?v=' + Date.now()),
                        20000,
                        'Loading _CIESEN.ck timed out'
                    );

                    if (result && (result.error || result.shredId === 0)) {
                        let err = result.error || 'unknown error';
                        try { err = err || await ck.getLastError(); } catch(e) {}
                        fail('compile error:\n\n' + err);
                        return;
                    }

                    clearInterval(dotInterval);
                    statusEl.classList.add('hidden');

                    // Resume all captured AudioContexts now that ChuGL is running
                    log('captured ' + _capturedContexts.length + ' AudioContext(s)');
                    resumeAllAudio();
                    // If still suspended, user needs to tap
                    const anySuspended = _capturedContexts.some(c => c.state === 'suspended');
                    if (anySuspended) log('tap screen for audio');

                    // prevent iOS rubber-banding on canvas
                    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

                } catch (err) {
                    console.error('[CIESEN]', err);
                    let detail = err.message || String(err);
                    if (detail.includes('GPU') || detail.includes('gpu') || detail.includes('adapter')) {
                        detail += '\n\niOS: Settings > Safari > Feature Flags > WebGPU';
                    }
                    fail(detail);
                }
            })();
        }
    </script>
</body>
</html>
