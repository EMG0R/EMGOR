<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="style/base.css">
    <link rel="stylesheet" href="style/music.css">
    <title>EMGOR</title>
</head>
<body>

    <div id="background-layer"></div>
    <canvas id="lavaCanvas"></canvas>

    <a href="index.html" class="home-button">&#8962;</a>

    <h1 id="neptr-title">PORTFOLIO</h1>

    <div class="video-container">
        <div class="video-wrapper">
            <div class="video-content">
                <video class="video-player" controls playsinline>
                    <source src="/resources/indexVIDS/1_EMORY_SMITH_491.mp4" type="video/mp4">
                </video>
                <p class="video-text">Showcase of prototypes I've made</p>
            </div>
        </div>
        <div class="video-wrapper">
            <div class="video-content">
                <video class="video-player" controls playsinline>
                    <source src="/resources/indexVIDS/2_DSP.mp4" type="video/mp4">
                </video>
                <p class="video-text">Showcase of DSP work in Max/MSP, Csound and C++</p>
            </div>
        </div>
        <div class="video-wrapper">
            <div class="video-content">
                <video class="video-player" controls playsinline>
                    <source src="/resources/indexVIDS/3_VIDEOSYNTH.mp4" type="video/mp4">
                </video>
                <p class="video-text">Showcase of my video synth built in Max/MSP's Jitter</p>
            </div>
        </div>
        <div class="video-wrapper">
            <div class="video-content">
                <video class="video-player" controls playsinline>
                    <source src="/resources/indexVIDS/4_WEBSYNTH.mp4" type="video/mp4">
                </video>
                <p class="video-text">Demo of my web synth</p>
            </div>
        </div>
    </div>

    <img id="toggle-image" src="resources/EMGOR.jpg" alt="Reveal Audio">
    <p style="text-align: center; color: white; font-family: 'Courier New', monospace; margin-bottom: 20px;">music i have produced/written</p>

    <div id="track-list" class="track-list" style="display: none;">
        <div class="track-row" data-src="../resources/anxiety.wav">
            <button class="track-play">&#9654;</button>
            <span class="track-name">anxiety</span>
            <div class="track-scrubber"><div class="track-progress"></div></div>
            <span class="track-time">0:00</span>
        </div>
        <div class="track-row" data-src="../resources/okay.wav">
            <button class="track-play">&#9654;</button>
            <span class="track-name">okay</span>
            <div class="track-scrubber"><div class="track-progress"></div></div>
            <span class="track-time">0:00</span>
        </div>
        <div class="track-row" data-src="../resources/matthew.wav">
            <button class="track-play">&#9654;</button>
            <span class="track-name">matthew</span>
            <div class="track-scrubber"><div class="track-progress"></div></div>
            <span class="track-time">0:00</span>
        </div>
        <div class="track-row" data-src="../resources/fitmk.wav">
            <button class="track-play">&#9654;</button>
            <span class="track-name">fitmk</span>
            <div class="track-scrubber"><div class="track-progress"></div></div>
            <span class="track-time">0:00</span>
        </div>
        <div class="track-row" data-src="../resources/mashup.wav">
            <button class="track-play">&#9654;</button>
            <span class="track-name">mashup</span>
            <div class="track-scrubber"><div class="track-progress"></div></div>
            <span class="track-time">0:00</span>
        </div>
        <div class="track-row" data-src="../resources/sad.wav">
            <button class="track-play">&#9654;</button>
            <span class="track-name">sad</span>
            <div class="track-scrubber"><div class="track-progress"></div></div>
            <span class="track-time">0:00</span>
        </div>
        <div class="video-track-row" data-video="../resources/spiderverse.mov">
            <button class="track-play">&#9654; spiderverse</button>
            <video controls playsinline style="display: none;">
                <source src="../resources/spiderverse.mov" type="video/mp4">
            </video>
        </div>
    </div>

    <script src="js/music.js"></script>
    <script src="js/lava.js"></script>
    <div style="height: 100px;"></div>
</body>
</html>
